<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIZZA HQ</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="panel header-bar">
            <div class="brand">🍕 PIZZA GROUP</div>
            <nav class="main-nav">
                <button onclick="showSection('leaderboard')">Leaderboard</button>
                <button onclick="showSection('games')">Mini Games</button>
                <button onclick="showSection('chat')">WhatsApp Hub</button>
                <button id="adminBtn" onclick="openLegendMenu()">LEGENDS MENU</button>
            </nav>
            <div class="user-info">
                <span id="rank-badge">Visitor</span>
                <span id="login-status">Logging in...</span>
            </div>
        </header>

        <main id="main-view" class="panel">
            <div id="leaderboard" class="view">
                <h2>SUPERVISOR VIEW: LEADERBOARD</h2>
                <div id="leaderboard-list"></div>
            </div>
            <div id="games" class="view hidden"><h2>PIZZA ARCADE</h2></div>
            <div id="chat" class="view hidden"><h2>WHATSAPP HUB</h2></div>
        </main>
    </div>

    <div id="legend-overlay" class="modal hidden">
        <div class="modal-content glass">
            <h2>LEGACY OVERRIDE</h2>
            <p id="lock-msg">Enter founder passcode.</p>
            <input type="password" id="founder-key" onkeydown="if(event.key === 'Enter') verifyFounder()">
            <div id="rank-editor-ui" class="hidden"></div>
            <button onclick="closeLegendMenu()" class="close-btn">X CLOSE</button>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script src="app.js"></script>
</body>
</html>
